<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Think Unlimited</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #e8e2da;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 60px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: #1a2240;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid #1a2240;
      border-radius: 999px;
      padding: 6px 8px;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 400;
      color: #1a2240;
      padding: 8px 22px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.05em;
    }

    .nav-links a.active {
      background: #1a2240;
      color: #e8e2da;
    }

    .nav-links a:not(.active):hover {
      background: rgba(26,34,64,0.08);
    }

    /* DROPDOWN */
    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2240;
      color: #e8e2da;
      padding: 10px 18px;
      border-radius: 12px;
      white-space: nowrap;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }

    .dropdown.open .dropdown-menu {
      display: block;
    }

    /* HERO */
    .hero {
      padding: 80px 60px 60px;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: space-between;
    }

    .hero-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .subtitle {
      font-size: 1.35rem;
      font-weight: 300;
      color: #3a4060;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      color: #1a2240;
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    .hero-image img {
      max-height: 500px;
      width: auto;
      display: block;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">THINK UNLIMITED.</div>
    <div class="nav-links">
      <a href="#" class="active">HOME</a>
      <div class="dropdown">
        <a href="#" onclick="this.parentElement.classList.toggle('open'); return false;">ABOUT</a>
        <div class="dropdown-menu">How AI is Transforming Business</div>
      </div>
      <a href="#">CONTACTO</a>
      <a href="#">OTHERS</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-text">
      <p class="subtitle">The Business of</p>
      <h1 class="headline">Artificial<br>Intelligence</h1>
    </div>
    <div class="hero-image">
      <img src="imagen ia.png" alt="AI Robot" />
    </div>
  </div>

</body>
</html>
